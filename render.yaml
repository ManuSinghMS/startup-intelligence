services:
  - type: web
    name: startup-intel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_PATH
        value: /data/startup_intel.db
      - key: PYTHON_VERSION
        value: "3.10"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
