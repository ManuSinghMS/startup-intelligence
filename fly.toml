# fly.toml app configuration file generated for startup-intelligence on 2026-05-13T15:22:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'startup-intelligence'
primary_region = 'iad'

[build]

[env]
  DATABASE_PATH = '/data/startup_intel.db'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = 'startup_intel_data'
  destination = '/data'
  initial_size = '1gb'
